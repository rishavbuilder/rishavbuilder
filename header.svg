<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 70" width="450" height="70">
  <style>
    @keyframes fade {
      0%, 25% { opacity: 1; }
      30%, 95% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes fade2 {
      0%, 25% { opacity: 0; }
      30%, 50% { opacity: 1; }
      55%, 95% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes fade3 {
      0%, 50% { opacity: 0; }
      55%, 75% { opacity: 1; }
      80%, 95% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes fade4 {
      0%, 75% { opacity: 0; }
      80%, 100% { opacity: 1; }
    }
    .t1 { animation: fade 4s infinite; }
    .t2 { animation: fade2 4s infinite; }
    .t3 { animation: fade3 4s infinite; }
    .t4 { animation: fade4 4s infinite; }
  </style>
  <rect width="450" height="70" fill="#0d1117" rx="8" />
  <text x="225" y="42" text-anchor="middle" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#ff4757" class="t1">🚀 Frontend Developer</text>
  <text x="225" y="42" text-anchor="middle" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#ff4757" class="t2">🤖 AI Enthusiast</text>
  <text x="225" y="42" text-anchor="middle" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#ff4757" class="t3">🌟 Open Source Creator</text>
  <text x="225" y="42" text-anchor="middle" font-family="Fira Code, monospace" font-size="22" font-weight="700" fill="#ff4757" class="t4">📘 BCA Student | Tech Innovator</text>
</svg>
